<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkyCommand · Pilot Notepad</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --amber:#fbbf24; --cyan:#38bdf8; --green:#22c55e; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; min-height:100%; background:#06080d; color:#e7eef9; font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  body {
    background:
      radial-gradient(ellipse at top, rgba(56,189,248,.06), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(251,191,36,.04), transparent 60%),
      linear-gradient(180deg, #0a1322 0%, #06080d 100%);
    min-height:100vh;
  }
  .topbar {
    display:flex; align-items:center; gap:14px;
    padding:18px 28px;
    border-bottom:1px solid rgba(56,189,248,.18);
    background:linear-gradient(180deg, rgba(8,14,24,.75), rgba(4,8,14,.55));
    backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:10;
  }
  .back-btn {
    background:linear-gradient(180deg,#1f2738,#141b2a);
    color:var(--amber);
    border:1px solid rgba(251,191,36,.4);
    padding:8px 16px;
    border-radius:3px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-decoration:none;
    text-transform:uppercase;
    text-shadow:0 0 5px rgba(251,191,36,.45);
    box-shadow:0 2px 6px rgba(0,0,0,.5);
  }
  .back-btn:hover { color:#fff; }
  .topbar-tag { font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--cyan); letter-spacing:.18em; padding:4px 10px; border:1px solid rgba(56,189,248,.35); border-radius:2px; text-transform:uppercase; }
  .topbar h1 { flex:1; font-size:18px; font-weight:600; color:#fff; }
  .saved {
    font-family:'JetBrains Mono',monospace; font-size:11px;
    color:var(--green); letter-spacing:.1em; text-shadow:0 0 5px rgba(34,197,94,.4);
  }
  .container { max-width:980px; margin:24px auto; padding:0 28px; }
  textarea {
    width:100%;
    min-height:calc(100vh - 200px);
    background:rgba(2,6,12,.75);
    border:1px solid rgba(56,189,248,.25);
    border-radius:6px;
    padding:24px 28px;
    color:#e7eef9;
    font-family:'JetBrains Mono',monospace;
    font-size:14px;
    line-height:1.7;
    resize:vertical;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
    text-shadow:0 0 4px rgba(231,238,249,.18);
  }
  textarea:focus { outline:none; border-color:var(--amber); box-shadow:0 0 0 2px rgba(251,191,36,.18); }
  .toolbar { display:flex; gap:10px; margin-top:14px; }
  .btn {
    background:linear-gradient(180deg,#1f2738,#141b2a);
    color:var(--amber); border:1px solid rgba(251,191,36,.4);
    padding:8px 16px; border-radius:2px;
    font-family:'JetBrains Mono',monospace; font-size:11px;
    letter-spacing:.14em; cursor:pointer; text-transform:uppercase;
    text-shadow:0 0 4px rgba(251,191,36,.4);
  }
  .btn.danger { color:#ef4444; border-color:rgba(239,68,68,.4); }
  .hint { margin-top:14px; font-family:'JetBrains Mono',monospace; font-size:11px; color:#94a3b8; letter-spacing:.05em; }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← BACK TO COCKPIT</a>
  <span class="topbar-tag">CENTER PEDESTAL</span>
  <h1>Pilot Notepad</h1>
  <span class="saved" id="saved"></span>
</div>

<div class="container">
  <textarea id="memo" placeholder="Pre-flight notes, route briefings, ATC clearances, what's on your mind…"></textarea>
  <div class="toolbar">
    <button class="btn" onclick="saveMemo()">Save</button>
    <button class="btn danger" onclick="clearMemo()">Clear</button>
  </div>
  <div class="hint">Auto-saves as you type · Stored locally on this device · Press ESC to return to cockpit</div>
</div>

<script>
const $ = id => document.getElementById(id);
$('memo').value = localStorage.getItem('pilot_memo') || '';
function saveMemo(){
  localStorage.setItem('pilot_memo', $('memo').value);
  $('saved').textContent = 'SAVED · '+new Date().toLocaleTimeString();
  setTimeout(() => { $('saved').textContent = ''; }, 2500);
}
function clearMemo(){
  if (confirm('Clear notepad?')) {
    $('memo').value = ''; localStorage.removeItem('pilot_memo');
    $('saved').textContent = 'CLEARED';
  }
}
$('memo').addEventListener('input', function(){
  clearTimeout(this._t);
  this._t = setTimeout(saveMemo, 700);
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') location.href = 'index.html'; });
</script>
</body>
</html>
