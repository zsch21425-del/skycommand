<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SkyCommand · Logbook</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root { --amber:#fbbf24; --cyan:#38bdf8; --green:#22c55e; --red:#ef4444; }
  * { box-sizing:border-box; margin:0; padding:0; }
  html, body { width:100%; min-height:100%; background:#06080d; color:#e7eef9; font-family:'Inter',system-ui,sans-serif; -webkit-font-smoothing:antialiased; }
  body {
    background:
      radial-gradient(ellipse at top, rgba(56,189,248,.08), transparent 60%),
      radial-gradient(ellipse at bottom, rgba(251,191,36,.04), transparent 60%),
      linear-gradient(180deg, #0a1322 0%, #06080d 100%);
    min-height:100vh;
    padding:0 0 60px;
  }
  .topbar {
    display:flex; align-items:center; gap:14px;
    padding:18px 28px;
    border-bottom:1px solid rgba(56,189,248,.18);
    background:linear-gradient(180deg, rgba(8,14,24,.75), rgba(4,8,14,.55));
    backdrop-filter:blur(10px);
    position:sticky; top:0; z-index:10;
  }
  .back-btn {
    display:inline-flex; align-items:center; gap:8px;
    background:linear-gradient(180deg,#1f2738,#141b2a);
    color:var(--amber);
    border:1px solid rgba(251,191,36,.4);
    padding:8px 16px;
    border-radius:3px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.16em;
    text-decoration:none;
    text-transform:uppercase;
    text-shadow:0 0 5px rgba(251,191,36,.45);
    box-shadow:0 2px 6px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
  }
  .back-btn:hover { color:#fff; }
  .topbar-tag {
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    color:var(--cyan);
    letter-spacing:.18em;
    padding:4px 10px;
    border:1px solid rgba(56,189,248,.35);
    border-radius:2px;
    text-transform:uppercase;
  }
  .topbar h1 {
    flex:1; font-size:18px; font-weight:600; color:#fff; letter-spacing:.01em;
  }
  .topbar .clock {
    font-family:'JetBrains Mono',monospace;
    font-size:13px;
    color:var(--amber);
    letter-spacing:.14em;
    text-shadow:0 0 5px rgba(251,191,36,.45);
  }
  .container { max-width:1280px; margin:24px auto; padding:0 28px; }
  .stats {
    display:grid; grid-template-columns:repeat(4, 1fr); gap:14px;
    margin-bottom:24px;
  }
  .stat-card {
    background:linear-gradient(180deg, rgba(20,30,46,.65), rgba(14,22,36,.65));
    border:1px solid rgba(56,189,248,.18);
    border-radius:6px;
    padding:14px 16px;
  }
  .stat-card .lbl { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.18em; color:var(--cyan); text-transform:uppercase; text-shadow:0 0 4px rgba(56,189,248,.4); }
  .stat-card .val { font-size:26px; font-weight:700; color:var(--amber); margin-top:4px; font-family:'JetBrains Mono',monospace; text-shadow:0 0 8px rgba(251,191,36,.35); }
  @media (max-width: 760px) { .stats { grid-template-columns:repeat(2, 1fr); } }
  .panel {
    background:linear-gradient(180deg, rgba(20,30,46,.55), rgba(14,22,36,.55));
    border:1px solid rgba(56,189,248,.18);
    border-radius:8px;
    padding:18px 22px;
    margin-bottom:20px;
  }
  .panel h2 {
    font-size:14px; font-weight:600; color:#fff; margin-bottom:14px;
    display:flex; align-items:center; gap:10px;
  }
  .panel h2::before {
    content:''; width:3px; height:18px; background:var(--amber); border-radius:1px; box-shadow:0 0 5px var(--amber);
  }
  .add-form {
    display:grid; grid-template-columns:repeat(7, 1fr) auto; gap:8px;
    margin-bottom:16px;
  }
  @media (max-width: 900px) { .add-form { grid-template-columns:1fr 1fr; } }
  .inp {
    background:rgba(2,6,12,.7);
    border:1px solid rgba(56,189,248,.25);
    color:#fff;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
    padding:8px 10px;
    border-radius:3px;
  }
  .inp:focus { outline:none; border-color:var(--amber); box-shadow:0 0 0 2px rgba(251,191,36,.18); }
  .btn {
    background:linear-gradient(180deg,#1f2738,#141b2a);
    color:var(--amber);
    border:1px solid rgba(251,191,36,.4);
    padding:8px 16px;
    border-radius:2px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:.14em;
    cursor:pointer;
    text-transform:uppercase;
    text-shadow:0 0 4px rgba(251,191,36,.4);
  }
  .btn:hover { color:#fff; }
  .btn.cyan { color:var(--cyan); border-color:rgba(56,189,248,.4); text-shadow:0 0 4px rgba(56,189,248,.4); }
  .btn.danger { color:var(--red); border-color:rgba(239,68,68,.4); }
  table {
    width:100%; border-collapse:collapse;
    font-family:'JetBrains Mono',monospace;
    font-size:12px;
  }
  table th {
    text-align:left; padding:8px 10px;
    color:var(--cyan); font-size:10px; letter-spacing:.14em; text-transform:uppercase;
    border-bottom:1px solid rgba(56,189,248,.25);
  }
  table td {
    padding:8px 10px; border-bottom:1px solid rgba(56,189,248,.08); color:#dfe7f3;
  }
  table tr:hover td { background:rgba(56,189,248,.04); }
  .empty { padding:32px; text-align:center; color:#94a3b8; font-family:'JetBrains Mono',monospace; font-size:12px; }
</style>
</head>
<body>

<div class="topbar">
  <a href="index.html" class="back-btn">← BACK TO COCKPIT</a>
  <span class="topbar-tag">SIDE PANEL</span>
  <h1>Pilot Logbook · N-529TF</h1>
  <span class="clock" id="clk">--:-- UTC</span>
</div>

<div class="container">
  <div class="stats">
    <div class="stat-card"><div class="lbl">Total Hours</div><div class="val" id="stTot">0.0</div></div>
    <div class="stat-card"><div class="lbl">Last 30 Days</div><div class="val" id="st30">0.0</div></div>
    <div class="stat-card"><div class="lbl">Last 90 Days</div><div class="val" id="st90">0.0</div></div>
    <div class="stat-card"><div class="lbl">Entries</div><div class="val" id="stN">0</div></div>
  </div>

  <div class="panel">
    <h2>Add Flight</h2>
    <div class="add-form">
      <input class="inp" id="lbDate" type="date" placeholder="Date">
      <input class="inp" id="lbAc" placeholder="Aircraft (N529TF)">
      <input class="inp" id="lbFrom" placeholder="From (KGMU)" maxlength="6" style="text-transform:uppercase">
      <input class="inp" id="lbTo" placeholder="To (KCLT)" maxlength="6" style="text-transform:uppercase">
      <input class="inp" id="lbHrs" type="number" step="0.1" placeholder="Hours">
      <input class="inp" id="lbType" placeholder="Type (XC, IFR, etc.)">
      <input class="inp" id="lbRem" placeholder="Remarks">
      <button class="btn" onclick="addLog()">+ Add</button>
    </div>
  </div>

  <div class="panel">
    <h2>Flight Log</h2>
    <table>
      <thead>
        <tr><th>Date</th><th>Aircraft</th><th>Route</th><th>Hrs</th><th>Type</th><th>Remarks</th><th></th></tr>
      </thead>
      <tbody id="lbBody"></tbody>
    </table>
    <div style="margin-top:14px; display:flex; gap:8px;">
      <button class="btn cyan" onclick="exportLog()">Export CSV</button>
    </div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const fmt2 = n => String(n).padStart(2,'0');

function tickClk(){
  const d = new Date();
  $('clk').textContent = fmt2(d.getUTCHours())+':'+fmt2(d.getUTCMinutes())+' UTC';
}
setInterval(tickClk, 1000); tickClk();

function getLog(){ return JSON.parse(localStorage.getItem('logbook')||'[]'); }
function setLog(l){ localStorage.setItem('logbook', JSON.stringify(l)); }

function renderLog(){
  const log = getLog();
  if (log.length === 0) {
    $('lbBody').innerHTML = '<tr><td colspan="7" class="empty">No flights logged yet.</td></tr>';
  } else {
    $('lbBody').innerHTML = log.slice().reverse().map((e,i) => {
      const realIdx = log.length-1-i;
      return `<tr>
        <td>${e.date||'—'}</td>
        <td>${e.ac||'—'}</td>
        <td>${(e.from||'')}→${(e.to||'')}</td>
        <td>${(+e.hrs||0).toFixed(1)}</td>
        <td>${e.type||''}</td>
        <td>${e.rem||''}</td>
        <td><button class="btn danger" onclick="delLog(${realIdx})">×</button></td>
      </tr>`;
    }).join('');
  }
  // Stats
  const total = log.reduce((a,b) => a+(+b.hrs||0), 0);
  const today = new Date();
  const d30 = new Date(today.getTime() - 30*86400000);
  const d90 = new Date(today.getTime() - 90*86400000);
  const sum30 = log.filter(e => new Date(e.date) >= d30).reduce((a,b)=>a+(+b.hrs||0), 0);
  const sum90 = log.filter(e => new Date(e.date) >= d90).reduce((a,b)=>a+(+b.hrs||0), 0);
  $('stTot').textContent = total.toFixed(1);
  $('st30').textContent = sum30.toFixed(1);
  $('st90').textContent = sum90.toFixed(1);
  $('stN').textContent  = log.length;
}
function addLog(){
  const log = getLog();
  log.push({
    date: $('lbDate').value || new Date().toISOString().slice(0,10),
    ac: $('lbAc').value,
    from: $('lbFrom').value.toUpperCase(),
    to: $('lbTo').value.toUpperCase(),
    hrs: $('lbHrs').value,
    type: $('lbType').value,
    rem: $('lbRem').value
  });
  setLog(log);
  ['lbDate','lbAc','lbFrom','lbTo','lbHrs','lbRem','lbType'].forEach(id => $(id).value='');
  renderLog();
}
function delLog(i){ const log = getLog(); log.splice(i,1); setLog(log); renderLog(); }
function exportLog(){
  const log = getLog();
  const csv = 'date,aircraft,from,to,hrs,type,remarks\n' +
    log.map(e => [e.date, e.ac, e.from, e.to, e.hrs, e.type, (e.rem||'').replace(/,/g,';')].join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'logbook.csv'; a.click();
}
renderLog();

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') location.href = 'index.html';
});
</script>
</body>
</html>
